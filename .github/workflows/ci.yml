name: CI

on:
  pull_request:
    # Any update here needs to be done for `push` (see below), and mirrored into
    # `no-ci.yml`.
    paths-ignore:
      # Workflows that have no effect on this workflow.
      - '.github/dependabot.yml'
      - '.github/workflows/book.yml'
      - '.github/workflows/ci-skip.yml'
      - '.github/workflows/lints.yml'
      # Documentation.
      - 'doc/**'
      - '**.md'
      - 'COPYING'
  push:
    branches: main
    # Any update here needs to be done for `pull_request` (see above), and
    # mirrored into `ci-skip.yml`.
    paths-ignore:
      # Workflows that have no effect on this workflow.
      - '.github/dependabot.yml'
      - '.github/workflows/book.yml'
      - '.github/workflows/ci-skip.yml'
      - '.github/workflows/lints.yml'
      # Documentation.
      - 'doc/**'
      - '**.md'
      - 'COPYING'
  repository_dispatch:
    types:
      - zebra-interop-request
      - zallet-interop-request

permissions:
  contents: read

jobs:
  setup:
    name: Define CI matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cfg:
          - data:
            # - name: Debian-bookworm
            #   required: true
            #   platform: Debian Bookworm
            #   build_os: ${{ vars.UBUNTU_22_04_LARGE_RUNNER || 'ubuntu-22.04' }}
            #   test_os: ubuntu-22.04
            #   container: electriccoinco/debian-helper:bookworm
            #   host: x86_64-pc-linux-gnu
            #   rust_target: x86_64-unknown-linux-gnu

            # - name: Debian-bullseye
            #   required: true
            #   platform: Debian bullseye
            #   build_os: ${{ vars.UBUNTU_22_04_LARGE_RUNNER || 'ubuntu-22.04' }}
            #   test_os: ubuntu-22.04
            #   container: electriccoinco/debian-helper:bullseye
            #   host: x86_64-pc-linux-gnu
            #   rust_target: x86_64-unknown-linux-gnu

            - name: ubuntu-22.04
              required: true
              platform: Ubuntu 22.04
              build_os: ${{ vars.UBUNTU_22_04_LARGE_RUNNER || 'ubuntu-22.04' }}
              test_os: ubuntu-22.04
              host: x86_64-pc-linux-gnu
              rust_target: x86_64-unknown-linux-gnu

            - name: ubuntu-24.04
              required: false
              platform: Ubuntu 24.04
              build_os: ubuntu-24.04
              test_os: ubuntu-24.04
              host: x86_64-pc-linux-gnu
              rust_target: x86_64-unknown-linux-gnu

            # - name: macos-12
            #   required: false
            #   platform: macOS 12 Monterey
            #   build_os: macos-12
            #   test_os: macos-12
            #   brew_deps: >
            #     autoconf
            #     automake
            #     coreutils
            #     libtool
            #     pkgconfig
            #   host: x86_64-apple-darwin
            #   rust_target: x86_64-apple-darwin

            - name: mingw32
              required: false
              platform: Windows (64-bit MinGW)
              build_os: ${{ vars.UBUNTU_22_04_LARGE_RUNNER || 'ubuntu-22.04' }}
              test_os: windows-latest
              cross_deps: >
                mingw-w64
              host: x86_64-w64-mingw32
              rust_target: x86_64-pc-windows-gnu
              file_ext: ".exe"

            - name: aarch64-linux
              required: false
              platform: ARM64 Linux
              build_os: ${{ vars.UBUNTU_22_04_LARGE_RUNNER || 'ubuntu-22.04' }}
              cross_deps: >
                g++-aarch64-linux-gnu
              host: aarch64-linux-gnu
              rust_target: aarch64-unknown-linux-gnu

    outputs:
      build_matrix: ${{ steps.set-matrices.outputs.build_matrix }}
      build_names: ${{ steps.set-matrices.outputs.build_names }}
      test_matrix: ${{ steps.set-matrices.outputs.test_matrix }}
      test_names: ${{ steps.set-matrices.outputs.test_names }}
      unix_test_matrix: ${{ steps.set-matrices.outputs.unix_test_matrix }}
      unix_test_names: ${{ steps.set-matrices.outputs.unix_test_names }}
      rpc_test_matrix: ${{ steps.set-matrices.outputs.rpc_test_matrix }}
      rpc_test_names: ${{ steps.set-matrices.outputs.rpc_test_names }}
      rpc_test_shards: ${{ steps.set-rpc-tests.outputs.rpc_test_shards }}
      rpc_test_shards_matrix: ${{ steps.set-rpc-tests.outputs.rpc_test_shards_matrix }}

    steps:
      - name: Select the test branch
        id: test-branch
        if: endsWith(github.event.action, '-interop-request')
        env:
          TEST_SHA: ${{ github.event.client_payload.test_sha }}
        run: |
          if [ "${TEST_SHA}" != "null" ] && [ -n "${TEST_SHA}" ]; then
            echo "test_sha=${TEST_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Check out the selected test branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Empty on direct repo PRs, which selects the default.
          ref: ${{ steps.test-branch.outputs.test_sha }}
          persist-credentials: false

      # When triggered by repository_dispatch, callers may specify a subset of
      # platforms to run via client_payload.platforms (a JSON array of platform
      # names). When absent, all platforms run. Explicitly requested platforms
      # are treated as required (run RPC tests, must pass).
      - id: filter-platforms
        env:
          CFG: ${{ toJSON(matrix.cfg) }}
          REQUESTED_PLATFORMS: ${{ toJSON(github.event.client_payload.platforms) }}
        run: |
          if [ "$REQUESTED_PLATFORMS" != "null" ] && [ -n "$REQUESTED_PLATFORMS" ]; then
            # Identify requested platforms not present in the configuration.
            jq -r -n --argjson req "$REQUESTED_PLATFORMS" \
              'env.CFG | fromjson | .data | [.[].name] as $known
              | [$req[] | select(. as $n | $known | index($n) | not)]
              | @json "unsupported_platforms=\(.)"' >> $GITHUB_OUTPUT
            # Filter to requested platforms, mark as required, and add suffix.
            jq -r -n --argjson req "$REQUESTED_PLATFORMS" '
              env.CFG | fromjson
              | .data |= [.[] | select(.name as $n | $req | index($n))
                | .required = true | .required_suffix = " (required)"]
              | @json "cfg=\(.)"' >> $GITHUB_OUTPUT
          else
            # Add required_suffix based on the existing required flag.
            jq -r -n '
              env.CFG | fromjson
              | .data |= [.[] | .required_suffix = if .required then " (required)" else "" end]
              | @json "cfg=\(.)"' >> $GITHUB_OUTPUT
          fi

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./.github/actions/interop-repo-ids

      - id: notify-interop-error
        uses: ./.github/actions/notify-interop-error
        if: endsWith(github.event.action, '-interop-request') && steps.filter-platforms.outputs.unsupported_platforms != '[]'
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          unsupported-platforms: ${{ steps.filter-platforms.outputs.unsupported_platforms }}

      # Configure the build and test matrices. Notes:
      # - The `*_names` lists of platforms are combined with job-specific lists to build
      #   strategy matrices. The `*_matrix` lists then augment the matrix with parameters
      #   for each platform.
      # - We can only run tests on the subset of platforms that have a compatible runner
      #   (i.e. excluding cross-compiled platforms).
      # - Some tests don't currently work on Windows platforms, so we have a Unix subset.
      # - We only run RPC tests on required platforms, to save costs.
      - id: set-matrices
        env:
          CFG: ${{ steps.filter-platforms.outputs.cfg }}
        run: |
          jq -r -n 'env.CFG | fromjson | @json "build_matrix=\(.data)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | .name] | @json "build_names=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os)] | @json "test_matrix=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os) | .name] | @json "test_names=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os and .test_os != "windows-latest")] | @json "unix_test_matrix=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os and .test_os != "windows-latest") | .name] | @json "unix_test_names=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os and .required)] | @json "rpc_test_matrix=\(.)"' >> $GITHUB_OUTPUT
          jq -r -n 'env.CFG | fromjson | [.data[] | select(.test_os and .required) | .name] | @json "rpc_test_names=\(.)"' >> $GITHUB_OUTPUT

      - id: set-rpc-tests
        env:
          IS_INTEROP_REQUEST: ${{ endsWith(github.event.action, '-interop-request') }}
        run: |
          cat <<EOF > ./subclass.py
          import importlib
          import json
          import os
          import sys

          sys.path.append('qa/pull-tester')
          rpc_tests = importlib.import_module('rpc-tests')

          src_dir = os.environ["SRC_DIR"]
          is_interop_request = os.environ["IS_INTEROP_REQUEST"] == "true"
          SHARDS = 10

          # While we are getting the existing tests to pass, skip tests that are
          # not expected to pass; this makes it easier to distinguish expected
          # failures from unexpected ones.
          if is_interop_request:
              old_shards = 0
          else:
              num_old_tests = len(rpc_tests.BASE_SCRIPTS + rpc_tests.ZMQ_SCRIPTS)
              num_new_tests = len(rpc_tests.NEW_SCRIPTS)
              old_shards = (num_old_tests * SHARDS) // (num_old_tests + num_new_tests)

          new_shards = SHARDS - old_shards

          # These tests are ordered longest-test-first, to favor running tests in
          # parallel with the regular test runner. For chunking purposes, assign
          # tests to shards in round-robin order.
          test_shards = {}
          if old_shards > 0:
              for i, test in enumerate(rpc_tests.BASE_SCRIPTS + rpc_tests.ZMQ_SCRIPTS):
                  test_shards.setdefault(i % old_shards, []).append(test)
          for i, test in enumerate(rpc_tests.NEW_SCRIPTS):
              test_shards.setdefault(old_shards + (i % new_shards), []).append(test)

          test_list = []
          for i, tests in test_shards.items():
              test_list.append({
                  'shard': 'shard-%d' % i,
                  'rpc_tests': tests,
              })

          # These tests involve enough shielded spends (consuming all CPU cores)
          # that we can't run them in parallel, or fail intermittently so we run
          # them separately to enable not requiring that they pass.
          if not is_interop_request:
              for test in rpc_tests.SERIAL_SCRIPTS + rpc_tests.FLAKY_SCRIPTS:
                  test_list.append({
                      'shard': test,
                      'rpc_tests': [test],
                  })

          print(json.dumps(test_list))
          EOF
          RPC_MATRIX_JSON=$(echo '${{ steps.set-matrices.outputs.rpc_test_matrix }}')
          RPC_SHARDS_JSON=$(SRC_DIR=$(pwd) python3 ./subclass.py)
          echo "$RPC_SHARDS_JSON" | jq -r '[.[] | .shard] | @json "rpc_test_shards=\(.)"' >> $GITHUB_OUTPUT
          echo -e "$RPC_MATRIX_JSON\n$RPC_SHARDS_JSON" | jq -r -s 'add | @json "rpc_test_shards_matrix=\(.)"' >> $GITHUB_OUTPUT

      - name: Cache Sprout parameters
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: zcash-params
          key: zcash-params
          restore-keys: |
            zcash-params

      - name: Download Sprout parameters
        # In case the Sprout parameters are not currently cached
        shell: bash
        run: |
          mkdir zcash-params || echo ""
          curl -L -C - https://download.z.cash/downloads/sprout-groth16.params -o zcash-params/sprout-groth16.params

  build-zebra:
    name: Build zebrad on ${{ matrix.platform }}${{ matrix.required_suffix }}
    needs: setup
    runs-on: ${{ matrix.build_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_matrix) }}

    steps:
      - name: Check out integration-tests to access actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: integration-tests
          persist-credentials: false

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./integration-tests/.github/actions/interop-repo-ids

      - id: start-interop
        uses: ./integration-tests/.github/actions/start-interop
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zebrad on ${{ matrix.platform }}${{ matrix.required_suffix }}"

      - name: Use specified ZcashFoundation/zebra commit
        if: github.event.action == 'zebra-interop-request'
        shell: sh
        env:
          SHA: ${{ github.event.client_payload.sha }}
        run: echo "ZEBRA_REF=${SHA}" >> $GITHUB_ENV
      - name: Use ZcashFoundation/zebra current main
        if: github.event.action != 'zebra-interop-request'
        run: echo "ZEBRA_REF=refs/heads/main" >> $GITHUB_ENV

      - name: Check out ZcashFoundation/zebra
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ZcashFoundation/zebra
          ref: ${{ env.ZEBRA_REF }}
          path: zebra

      - name: Install Homebrew build dependencies
        if: matrix.brew_deps != ''
        run: brew install ${{ matrix.brew_deps }}

      - name: Install cross-compilation build dependencies
        if: matrix.cross_deps != ''
        run: sudo apt update && sudo apt install ${{ matrix.cross_deps }}

      - name: Configure MinGW to use POSIX variant
        if: matrix.name == 'mingw32'
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc $(update-alternatives --query x86_64-w64-mingw32-gcc | grep Alternative | grep posix | cut -d' ' -f2)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ $(update-alternatives --query x86_64-w64-mingw32-g++ | grep Alternative | grep posix | cut -d' ' -f2)

      - name: Prepare ccache timestamp
        id: ccache_cache_timestamp
        shell: bash
        run: echo "timestamp=$(date +'%Y-%m-%d-%H;%M;%S')" >> "$GITHUB_OUTPUT"

      - name: Cache ccache files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/ccache' || '~/.cache/ccache' }}
          key: ${{ matrix.name }}-ccache-${{ steps.ccache_cache_timestamp.outputs.timestamp }}
          restore-keys: |
            ${{ matrix.name }}-ccache-

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.name }}
          workspaces: "./zebra"

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}
        working-directory: ./zebra

      - name: Build zebrad
        env:
          HOST: ${{ matrix.host }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "aarch64-linux-gnu-gcc"
        run: cargo build --release --target ${{ matrix.rust_target }} --bin zebrad
        working-directory: ./zebra

      - name: Upload zebrad
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zebrad-${{ matrix.name }}
          path: |
              ${{ format('./zebra/target/{0}/release/zebrad{1}', matrix.rust_target, matrix.file_ext) }}

      - uses: ./integration-tests/.github/actions/finish-interop
        if: always()
        with:
          app-token: ${{ steps.start-interop.outputs.app-token }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zebrad on ${{ matrix.platform }}${{ matrix.required_suffix }}"

  build-zaino:
    name: Build zainod on ${{ matrix.platform }}${{ matrix.required_suffix }}
    needs: setup
    runs-on: ${{ matrix.build_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_matrix) }}

    steps:
      - name: Check out integration-tests to access actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: integration-tests
          persist-credentials: false

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./integration-tests/.github/actions/interop-repo-ids

      - id: start-interop
        uses: ./integration-tests/.github/actions/start-interop
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zainod on ${{ matrix.platform }}${{ matrix.required_suffix }}"

      - name: Use zingolabs/zaino current main
        run: echo "ZAINO_REF=refs/heads/dev" >> $GITHUB_ENV

      - name: Check out zingolabs/zaino
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: zingolabs/zaino
          ref: ${{ env.ZAINO_REF }}
          path: zaino

      - name: Install Homebrew build dependencies
        if: matrix.brew_deps != ''
        run: brew install ${{ matrix.brew_deps }}

      - name: Install cross-compilation build dependencies
        if: matrix.cross_deps != ''
        run: sudo apt update && sudo apt install ${{ matrix.cross_deps }}

      - name: Configure MinGW to use POSIX variant
        if: matrix.name == 'mingw32'
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc $(update-alternatives --query x86_64-w64-mingw32-gcc | grep Alternative | grep posix | cut -d' ' -f2)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ $(update-alternatives --query x86_64-w64-mingw32-g++ | grep Alternative | grep posix | cut -d' ' -f2)

      - name: Prepare ccache timestamp
        id: ccache_cache_timestamp
        shell: bash
        run: echo "timestamp=$(date +'%Y-%m-%d-%H;%M;%S')" >> "$GITHUB_OUTPUT"

      - name: Cache ccache files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/ccache' || '~/.cache/ccache' }}
          key: ${{ matrix.name }}-ccache-${{ steps.ccache_cache_timestamp.outputs.timestamp }}
          restore-keys: |
            ${{ matrix.name }}-ccache-

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.name }}
          workspaces: "./zaino"

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}
        working-directory: ./zaino

      - name: Build zainod
        env:
          HOST: ${{ matrix.host }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "aarch64-linux-gnu-gcc"
        run: cargo build --release --target ${{ matrix.rust_target }} --bin zainod
        working-directory: ./zaino

      - name: Upload zainod
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zainod-${{ matrix.name }}
          path: |
              ${{ format('./zaino/target/{0}/release/zainod{1}', matrix.rust_target, matrix.file_ext) }}

      - uses: ./integration-tests/.github/actions/finish-interop
        if: always()
        with:
          app-token: ${{ steps.start-interop.outputs.app-token }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zainod on ${{ matrix.platform }}${{ matrix.required_suffix }}"

  build-zallet:
    name: Build zallet on ${{ matrix.platform }}${{ matrix.required_suffix }}
    needs: setup
    runs-on: ${{ matrix.build_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_matrix) }}

    steps:
      - name: Check out integration-tests to access actions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: integration-tests
          persist-credentials: false

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./integration-tests/.github/actions/interop-repo-ids

      - id: start-interop
        uses: ./integration-tests/.github/actions/start-interop
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zallet on ${{ matrix.platform }}${{ matrix.required_suffix }}"

      - name: Use specified zcash/wallet commit
        if: github.event.action == 'zallet-interop-request'
        shell: sh
        env:
          SHA: ${{ github.event.client_payload.sha }}
        run: echo "ZALLET_REF=${SHA}" >> $GITHUB_ENV
      - name: Use zcash/wallet current main
        if: github.event.action != 'zallet-interop-request'
        run: echo "ZALLET_REF=refs/heads/main" >> $GITHUB_ENV

      - name: Check out zcash/wallet
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: zcash/wallet
          ref: ${{ env.ZALLET_REF }}
          path: zallet

      - name: Install Homebrew build dependencies
        if: matrix.brew_deps != ''
        run: brew install ${{ matrix.brew_deps }}

      - name: Install cross-compilation build dependencies
        if: matrix.cross_deps != ''
        run: sudo apt update && sudo apt install ${{ matrix.cross_deps }}

      - name: Configure MinGW to use POSIX variant
        if: matrix.name == 'mingw32'
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-gcc $(update-alternatives --query x86_64-w64-mingw32-gcc | grep Alternative | grep posix | cut -d' ' -f2)
          sudo update-alternatives --set x86_64-w64-mingw32-g++ $(update-alternatives --query x86_64-w64-mingw32-g++ | grep Alternative | grep posix | cut -d' ' -f2)

      - name: Prepare ccache timestamp
        id: ccache_cache_timestamp
        shell: bash
        run: echo "timestamp=$(date +'%Y-%m-%d-%H;%M;%S')" >> "$GITHUB_OUTPUT"

      - name: Cache ccache files
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ${{ runner.os == 'macOS' && '~/Library/Caches/ccache' || '~/.cache/ccache' }}
          key: ${{ matrix.name }}-ccache-${{ steps.ccache_cache_timestamp.outputs.timestamp }}
          restore-keys: |
            ${{ matrix.name }}-ccache-

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.name }}
          workspaces: "./zallet"

      - name: Install Rust target
        run: rustup target add ${{ matrix.rust_target }}
        working-directory: ./zallet

      - name: Build zallet
        env:
          HOST: ${{ matrix.host }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: "aarch64-linux-gnu-gcc"
        run: cargo build --release --target ${{ matrix.rust_target }} --bin zallet
        working-directory: ./zallet

      - name: Upload zallet
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: zallet-${{ matrix.name }}
          path: |
              ${{ format('./zallet/target/{0}/release/zallet{1}', matrix.rust_target, matrix.file_ext) }}

      - uses: ./integration-tests/.github/actions/finish-interop
        if: always()
        with:
          app-token: ${{ steps.start-interop.outputs.app-token }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "Build zallet on ${{ matrix.platform }}${{ matrix.required_suffix }}"

  # Not working in Windows
  sec-hard:
    name: sec-hard ${{ matrix.platform }}${{ matrix.required_suffix }}
    needs:
      - setup
      - build-zebra
      - build-zaino
      - build-zallet
    runs-on: ${{ matrix.test_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.setup.outputs.unix_test_matrix) }}

    steps:
      - name: Select the test branch
        id: test-branch
        if: endsWith(github.event.action, '-interop-request')
        env:
          TEST_SHA: ${{ github.event.client_payload.test_sha }}
        run: |
          if [ "${TEST_SHA}" != "null" ] && [ -n "${TEST_SHA}" ]; then
            echo "test_sha=${TEST_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Check out the selected test branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Empty on direct repo PRs, which selects the default.
          ref: ${{ steps.test-branch.outputs.test_sha }}
          persist-credentials: false

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./integration-tests/.github/actions/interop-repo-ids

      - id: start-interop
        uses: ./.github/actions/start-interop
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "sec-hard ${{ matrix.platform }}${{ matrix.required_suffix }}"

      - name: Download zebrad artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zebrad-${{ matrix.name }}
          path: ./src

      - name: Download zainod artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zainod-${{ matrix.name }}
          path: ./src

      - name: Download zallet artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zallet-${{ matrix.name }}
          path: ./src

      - name: Make artifact executable
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ format('./src/zebrad{0}', matrix.file_ext) }}
          chmod +x ${{ format('./src/zainod{0}', matrix.file_ext) }}
          chmod +x ${{ format('./src/zallet{0}', matrix.file_ext) }}

      - name: Run sec-hard test
        shell: bash
        run: python3 ./qa/zcash/full_test_suite.py sec-hard
        env:
          HOST: ${{ matrix.host }}

      - uses: ./.github/actions/finish-interop
        if: always()
        with:
          app-token: ${{ steps.start-interop.outputs.app-token }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "sec-hard ${{ matrix.platform }}${{ matrix.required_suffix }}"

  rpc-depends:
    name: RPC set up ${{ matrix.platform }}${{ matrix.required_suffix }}
    needs: setup
    runs-on: ${{ matrix.test_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      matrix:
        name: ${{ fromJson(needs.setup.outputs.rpc_test_names) }}
        include: ${{ fromJson(needs.setup.outputs.rpc_test_matrix) }}

    steps:
      - name: Cache Python dependencies for RPC tests
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          enableCrossOsArchive: true
          path: venv
          key: test-rpc-venv-${{ matrix.name }}

      - name: Get Python dependencies for RPC tests
        run: |
          python3 -m venv ./venv
          . ./venv/bin/activate
          pip install zmq asyncio base58 toml

  test-rpc:
    name: RPC tests ${{ matrix.platform }} ${{ matrix.shard }}${{ matrix.required_suffix }}
    needs:
      - setup
      - build-zebra
      - build-zaino
      - build-zallet
      - rpc-depends
    runs-on: ${{ matrix.test_os }}
    container:
      image: ${{ matrix.container }}
      env:
        HOME: /root
        PATH: /root/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:$PATH
    continue-on-error: ${{ !matrix.required }}
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.setup.outputs.rpc_test_names) }}
        shard : ${{ fromJson(needs.setup.outputs.rpc_test_shards) }}
        include: ${{ fromJson(needs.setup.outputs.rpc_test_shards_matrix) }}

    steps:
      - name: Select the test branch
        id: test-branch
        if: endsWith(github.event.action, '-interop-request')
        env:
          TEST_SHA: ${{ github.event.client_payload.test_sha }}
        run: |
          if [ "${TEST_SHA}" != "null" ] && [ -n "${TEST_SHA}" ]; then
            echo "test_sha=${TEST_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Check out the selected test branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Empty on direct repo PRs, which selects the default.
          ref: ${{ steps.test-branch.outputs.test_sha }}
          persist-credentials: false

      - name: Compute interop repo ids
        id: repo-ids
        uses: ./integration-tests/.github/actions/interop-repo-ids

      - id: start-interop
        uses: ./.github/actions/start-interop
        with:
          status-app-id: ${{ secrets.STATUS_APP_ID }}
          status-app-private-key: ${{ secrets.STATUS_APP_PRIVATE_KEY }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "RPC tests ${{ matrix.platform }} ${{ matrix.shard }}${{ matrix.required_suffix }}"

      - name: Cache Python dependencies for RPC tests
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          enableCrossOsArchive: true
          path: venv
          key: test-rpc-venv-${{ matrix.name }}

      - name: Get Python dependencies for RPC tests if not cached
        run: |
          python3 -m venv ./venv
          . ./venv/bin/activate
          pip install zmq asyncio base58 toml

      - name: Download zebrad artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zebrad-${{ matrix.name }}
          path: ./src

      - name: Download zainod artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zainod-${{ matrix.name }}
          path: ./src

      - name: Download zallet artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: zallet-${{ matrix.name }}
          path: ./src

      - name: Make artifact executable
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ format('./src/zebrad{0}', matrix.file_ext) }}
          chmod +x ${{ format('./src/zainod{0}', matrix.file_ext) }}
          chmod +x ${{ format('./src/zallet{0}', matrix.file_ext) }}

      - name: Get Sprout parameters
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: zcash-params
          key: zcash-params
          restore-keys: |
            zcash-params

      - name: Download Sprout parameters
        # In case the cache of Sprout parameters step fails
        shell: bash
        run: |
          mkdir zcash-params || echo ""
          curl -L -C - https://download.z.cash/downloads/sprout-groth16.params -o zcash-params/sprout-groth16.params

      - name: Setup zcash-params
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv zcash-params "$APPDATA/ZcashParams"
          elif [ "${{ runner.os }}" == "macOS" ]; then
            mv zcash-params "$HOME/Library/Application Support/ZcashParams"
          elif [ "${{ runner.os }}" == "Linux" ]; then
            mv zcash-params "$HOME/.zcash-params"
          fi

      - name: RPC test ${{ matrix.shard }}
        run: |
          cat <<EOF > ./subclass.py
          import importlib
          import os
          import subprocess
          import sys

          sys.path.append('qa/pull-tester')
          rpc_tests = importlib.import_module('rpc-tests')

          src_dir = os.environ["SRC_DIR"]
          build_dir = '.'
          exeext = '${{ matrix.file_ext }}'

          class MyTestHandler(rpc_tests.RPCTestHandler):
              def start_test(self, args, stdout, stderr):
                  return subprocess.Popen(
                      args,
                      universal_newlines=True,
                      stdout=stdout,
                      stderr=stderr)

          test_list = ${{ toJSON(matrix.rpc_tests) }}
          all_passed = rpc_tests.run_tests(MyTestHandler, test_list, src_dir, build_dir, exeext, jobs=len(test_list))
          if all_passed == False:
              sys.exit(1)
          EOF
          . ./venv/bin/activate
          ZEBRAD=$(pwd)/${{ format('src/zebrad{0}', matrix.file_ext) }} ZAINOD=$(pwd)/${{ format('src/zainod{0}', matrix.file_ext) }} ZALLET=$(pwd)/${{ format('src/zallet{0}', matrix.file_ext) }} SRC_DIR=$(pwd) python3 ./subclass.py

      - uses: ./.github/actions/finish-interop
        if: always()
        with:
          app-token: ${{ steps.start-interop.outputs.app-token }}
          requesting-owner: ${{ steps.repo-ids.outputs.requesting-owner }}
          requesting-repository: ${{ steps.repo-ids.outputs.requesting-repository }}
          job-name: "RPC tests ${{ matrix.platform }} ${{ matrix.shard }}${{ matrix.required_suffix }}"
